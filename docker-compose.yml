version: "3.9"

services:
  backend:
    build: ./backend
    container_name: crisisroom-ai-backend
    ports:
      - "8000:8000"
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_FAST_MODEL=${QWEN_FAST_MODEL:-qwen-plus}
      - QWEN_REASONING_MODEL=${QWEN_REASONING_MODEL:-qwen-max}
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: crisisroom-ai-frontend
    ports:
      - "5500:80"
    environment:
      - API_BASE=${API_BASE:-http://localhost:8000}
    depends_on:
      - backend
    restart: unless-stopped
